services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/jupyter-pytorch-opencode:cuda12-py311
    container_name: jupyter
    hostname: jupyter
    restart: unless-stopped

    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${JUPYTER_PORT:-8888}:8888"
      - "${BIND_ADDRESS:-0.0.0.0}:${OPENCODE_PORT:-4096}:4096"

    volumes:
      - "${JUPYTER_DATA_DIR:-./jupyter-data}:/home/jovyan/work"
      - opencode-config:/home/jovyan/.config/opencode
      - opencode-cache:/home/jovyan/.cache/opencode
      - github-config:/home/jovyan/.config/gh

    env_file:
      - path: "${JUPYTER_DATA_DIR:-./jupyter-data}/${OPENCODE_PROJECT_DIR:-project}/.env"
        required: false

    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:?Set JUPYTER_TOKEN in .env}"
      OPENCODE_PORT: "4096"
      OPENCODE_PROJECT_DIR: "${OPENCODE_PROJECT_DIR:-project}"
      OPENCODE_SERVER_USERNAME: "${OPENCODE_SERVER_USERNAME:-opencode}"
      OPENCODE_SERVER_PASSWORD: "${OPENCODE_SERVER_PASSWORD:?Set OPENCODE_SERVER_PASSWORD in .env}"

    working_dir: /home/jovyan/work
    stdin_open: true
    tty: true
    shm_size: "8gb"

    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --output /dev/null \"http://127.0.0.1:8888/api/contents?token=$${JUPYTER_TOKEN}\" && curl --fail --silent --user \"$${OPENCODE_SERVER_USERNAME}:$${OPENCODE_SERVER_PASSWORD}\" --output /dev/null http://127.0.0.1:4096/global/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  opencode-config:
  opencode-cache:
  github-config:
